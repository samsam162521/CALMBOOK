<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slither.io Style Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #gameCanvas {
      display: block;
      background: #0a0e1a;
    }

    /* Start Screen */
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #startScreen.hidden {
      display: none;
    }

    #startScreen h1 {
      font-size: 64px;
      color: #10b981;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
    }

    #usernameInput {
      padding: 15px 30px;
      font-size: 18px;
      border: 2px solid #10b981;
      border-radius: 10px;
      background: rgba(16, 185, 129, 0.1);
      color: white;
      margin-bottom: 20px;
      width: 300px;
      text-align: center;
    }

    #playButton {
      padding: 15px 50px;
      font-size: 20px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
      transition: transform 0.2s;
    }

    #playButton:hover {
      transform: scale(1.05);
    }

    /* Game Over Screen */
    #gameOverScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #gameOverScreen.show {
      display: flex;
    }

    #gameOverScreen h2 {
      font-size: 48px;
      color: #ef4444;
      margin-bottom: 20px;
    }

    #finalScore {
      font-size: 32px;
      color: white;
      margin-bottom: 30px;
    }

    #restartButton {
      padding: 15px 50px;
      font-size: 20px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
    }

    /* HUD */
    #hud {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 18px;
      text-align: right;
      z-index: 50;
    }

    #score {
      font-size: 24px;
      font-weight: bold;
      color: #10b981;
      margin-bottom: 10px;
    }

    /* Leaderboard */
    #leaderboard {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 10px;
      color: white;
      z-index: 50;
      min-width: 200px;
    }

    #leaderboard h3 {
      margin-bottom: 10px;
      color: #10b981;
      font-size: 18px;
    }

    .leaderboard-entry {
      padding: 5px 0;
      font-size: 14px;
    }

    .leaderboard-entry.player {
      color: #10b981;
      font-weight: bold;
    }

    /* Mobile Controls */
    #mobileControls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: none;
      z-index: 50;
    }

    #boostButton {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      border: 3px solid white;
      color: white;
      font-size: 24px;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
    }

    @media (max-width: 768px) {
      #mobileControls {
        display: block;
      }
      
      #startScreen h1 {
        font-size: 48px;
      }
      
      #usernameInput {
        width: 250px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Start Screen -->
  <div id="startScreen">
    <h1>🐍 EATTHER IO</h1>
    <input type="text" id="usernameInput" placeholder="Enter your name" maxlength="15" value="Player">
    <button id="playButton">PLAY</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen">
    <h2>GAME OVER</h2>
    <div id="finalScore">Score: 0</div>
    <button id="restartButton">PLAY AGAIN</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="score">Score: 0</div>
    <div id="length">Length: 10</div>
  </div>

  <!-- Leaderboard -->
  <div id="leaderboard">
    <h3>🏆 Leaderboard</h3>
    <div id="leaderboardList"></div>
  </div>

  <!-- Mobile Controls -->
  <div id="mobileControls">
    <button id="boostButton">⚡</button>
  </div>

  <script src="slither-game.js"></script>
</body>
</html>
